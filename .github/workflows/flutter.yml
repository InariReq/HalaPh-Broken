name: Flutter CI
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            /Users/runner/Library/Caches/flutter
          key: ${{ runner.os }}-dart-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-dart-
      - name: Install Flutter
        uses: subosito/flutter-action@v1
        with:
          flutter-version: '3.13.0'
      - name: Get dependencies
        run: flutter pub get
        working-directory: ./
      - name: Analyze
        run: flutter analyze
        working-directory: ./
      - name: Run tests (if any)
        run: flutter test || true
        working-directory: ./
      - name: Build macOS app
        run: flutter build macos -v
        working-directory: ./
      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: halaph-macos-build
          path: build/macos/Build/Products/Release/halaph.app
