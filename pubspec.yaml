name: halaph
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^14.0.0
  font_awesome_flutter: ^10.7.0
  cached_network_image: ^3.4.0
  http: ^1.2.0
  flutter_dotenv: ^5.2.0
  flutter_staggered_grid_view: ^0.7.0
  geolocator: ^14.0.0
  image_picker: ^1.1.0
  path_provider: ^2.1.5
  share_plus: ^10.0.0
  flutter_local_notifications: ^18.0.0
  firebase_messaging: ^15.2.3
  timezone: ^0.10.0
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.3
  firebase_auth: ^5.3.1
  firebase_storage: ^12.4.10
  google_maps_flutter: ^2.10.0
  firebase_database: ^11.3.10
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.9.2+1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - lib/Assets/gtfs-master/gtfs-master/routes.txt
    - lib/Assets/gtfs-master/gtfs-master/stops.txt
    - lib/Assets/gtfs-master/gtfs-master/trips.txt
    - lib/Assets/gtfs-master/gtfs-master/stop_times.txt

flutter_icons:
  android: true
  ios: true
  macos: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
