name: halaph
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^14.0.0
  font_awesome_flutter: ^10.7.0
  cached_network_image: ^3.4.0
  http: ^1.2.0
  flutter_dotenv: ^5.2.0
  flutter_staggered_grid_view: ^0.7.0
  geolocator: ^14.0.2
  image_picker: ^1.1.0
  share_plus: ^10.0.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  google_maps_flutter: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.9.2+1

flutter:
  uses-material-design: true
  assets:
    - lib/Assets/
    - .env
    - assets/icons/

flutter_icons:
  android: true
  ios: true
  macos: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
